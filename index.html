<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a2035">
<title>Cuadrantes</title>
<link rel="stylesheet" href="app.css">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
</head>
<body>

<div id="cargando" class="centro">Cargando…</div>

<!-- ============ LOGIN ============ -->
<section id="vista-login" class="centro" hidden>
  <form id="form-login" class="tarjeta">
    <img src="icon-192.png" alt="" class="logo">
    <h1>Cuadrantes</h1>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" required>
    <label for="password">Contraseña</label>
    <input id="password" type="password" autocomplete="current-password" required>
    <button id="btn-entrar" type="submit">Entrar</button>
    <p id="login-error" class="error" role="alert"></p>
  </form>
</section>

<!-- ============ APP ============ -->
<section id="vista-app" hidden>
  <header class="barra">
    <div>
      <strong id="negocio-nombre"></strong>
      <span class="sub"><span id="usuario-rol"></span> · <span id="usuario-email"></span></span>
    </div>
    <button id="btn-salir" class="ghost">Salir</button>
  </header>

  <main class="contenido">
    <div class="tarjeta">
      <h2>Conexión correcta</h2>
      <p class="sub">Estos datos vienen de la base de datos, no del código:</p>
      <dl class="debug">
        <dt>Días configurados</dt><dd id="debug-dias"></dd>
        <dt>Puestos</dt><dd id="debug-puestos"></dd>
        <dt>Publicación por defecto</dt><dd id="debug-pub"></dd>
      </dl>
    </div>
  </main>
</section>

<script type="module" src="js/app.js?v=5"></script>
</body>
</html>
